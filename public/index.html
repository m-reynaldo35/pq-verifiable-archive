<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PQ Verifiable Archive</title>
<style>
  :root {
    --bg: #0f0f0f;
    --panel: #161616;
    --panel-2: #1c1c1c;
    --border: #2a2a2a;
    --text: #e6e6e6;
    --muted: #8a8a8a;
    --green: #36d399;
    --red: #f87272;
    --blue: #5aa9ff;
    --grey: #6b6b6b;
    --amber: #f5c451;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    line-height: 1.5;
    padding: 48px 20px;
  }
  .wrap { max-width: 880px; margin: 0 auto; }
  header { margin-bottom: 40px; }
  h1 {
    font-size: 28px;
    margin: 0 0 6px;
    letter-spacing: -0.5px;
  }
  .tagline { color: var(--muted); font-size: 14px; margin: 0; }
  .zones { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
  .zone {
    flex: 1 1 280px;
    background: var(--panel);
    border: 1px dashed var(--border);
    border-radius: 8px;
    padding: 24px;
    transition: border-color 0.15s, background 0.15s;
    cursor: pointer;
    position: relative;
  }
  .zone:hover, .zone.drag { border-color: var(--blue); background: var(--panel-2); }
  .zone .label { font-size: 13px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
  .zone .label .req { color: var(--red); }
  .zone .label .opt { color: var(--grey); }
  .zone .hint { font-size: 13px; color: var(--grey); }
  .zone .filename { font-size: 13px; color: var(--green); word-break: break-all; margin-top: 4px; }
  .zone input[type=file] { display: none; }
  .actions { display: flex; align-items: center; gap: 16px; margin-bottom: 8px; }
  button.verify {
    background: var(--blue);
    color: #04122b;
    border: none;
    border-radius: 6px;
    padding: 12px 28px;
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  button.verify:disabled { opacity: 0.35; cursor: not-allowed; }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .net-error {
    display: none;
    background: rgba(248,114,114,0.1);
    border: 1px solid var(--red);
    color: var(--red);
    padding: 12px 16px;
    border-radius: 6px;
    font-size: 13px;
    margin-top: 16px;
  }
  #results { display: none; margin-top: 32px; }
  .section-title {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin: 28px 0 10px;
  }
  .step {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
    margin-bottom: 8px;
  }
  .step.info { opacity: 0.85; }
  .icon {
    flex: 0 0 22px;
    width: 22px; height: 22px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    font-size: 13px;
    font-weight: 700;
    margin-top: 1px;
  }
  .icon.pass { background: rgba(54,211,153,0.15); color: var(--green); }
  .icon.fail { background: rgba(248,114,114,0.15); color: var(--red); }
  .icon.info { background: rgba(107,107,107,0.2); color: var(--grey); }
  .icon.skip { background: rgba(245,196,81,0.15); color: var(--amber); }
  .icon.error { background: rgba(245,196,81,0.18); color: var(--amber); }
  .step .body { flex: 1; min-width: 0; }
  .step .name { font-size: 14px; font-weight: 600; }
  .step .subname { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .step.skip .detail { color: var(--amber); }
  .step .name .tag {
    font-size: 10px;
    color: var(--grey);
    border: 1px solid var(--grey);
    border-radius: 3px;
    padding: 1px 5px;
    margin-left: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    vertical-align: middle;
  }
  .step .detail { font-size: 12.5px; color: var(--muted); word-break: break-all; margin-top: 2px; }
  .step .detail a { color: var(--blue); text-decoration: none; }
  .step .detail a:hover { text-decoration: underline; }
  .signer {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 16px;
    margin-bottom: 8px;
    font-size: 13px;
  }
  .signer .sname { font-weight: 600; }
  .signer .smeta { color: var(--muted); font-size: 12px; }
  .banner {
    margin-top: 32px;
    border-radius: 8px;
    padding: 24px;
    text-align: center;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .banner.valid { background: rgba(54,211,153,0.12); border: 1px solid var(--green); color: var(--green); }
  .banner.invalid { background: rgba(248,114,114,0.12); border: 1px solid var(--red); color: var(--red); }
  .banner.warn { background: rgba(245,196,81,0.12); border: 1px solid var(--amber); color: var(--amber); }
  button.demo {
    background: transparent;
    color: var(--blue);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 16px;
    font-family: var(--mono);
    font-size: 13px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  button.demo:hover { border-color: var(--blue); }
  .banner .sub { display: block; font-size: 13px; font-weight: 400; color: var(--muted); margin-top: 8px; letter-spacing: 0; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>PQ Verifiable Archive</h1>
    <p class="tagline">Post-quantum tamper evidence for DocuSign envelopes</p>
  </header>

  <div style="margin-bottom: 16px;">
    <button class="demo" id="demoBtn">Try demo</button>
  </div>

  <div class="zones">
    <label class="zone" id="bundleZone">
      <div class="label">Proof Bundle (JSON) <span class="req">*</span></div>
      <div class="hint" data-default>Click or drop a .json bundle</div>
      <div class="filename" id="bundleName"></div>
      <input type="file" id="bundleInput" accept=".json,application/json" />
    </label>
    <label class="zone" id="pdfZone">
      <div class="label">Original PDF <span class="opt">(optional)</span></div>
      <div class="hint" data-default>Click or drop the original .pdf</div>
      <div class="filename" id="pdfName"></div>
      <input type="file" id="pdfInput" accept=".pdf,application/pdf" />
    </label>
  </div>

  <div class="actions">
    <button class="verify" id="verifyBtn" disabled>Verify</button>
    <div class="spinner" id="spinner"></div>
  </div>

  <div class="net-error" id="netError"></div>

  <div id="results">
    <div class="section-title">Verification Steps</div>
    <div id="steps"></div>

    <div id="signersWrap" style="display:none">
      <div class="section-title">Signers</div>
      <div id="signers"></div>
    </div>

    <div class="banner" id="banner"></div>
  </div>
</div>

<script>
  ['dragover', 'drop'].forEach(ev =>
    document.addEventListener(ev, e => e.preventDefault())
  );

  const bundleInput = document.getElementById('bundleInput');
  const pdfInput = document.getElementById('pdfInput');
  const bundleName = document.getElementById('bundleName');
  const pdfName = document.getElementById('pdfName');
  const verifyBtn = document.getElementById('verifyBtn');
  const spinner = document.getElementById('spinner');
  const netError = document.getElementById('netError');
  const results = document.getElementById('results');
  const stepsEl = document.getElementById('steps');
  const signersWrap = document.getElementById('signersWrap');
  const signersEl = document.getElementById('signers');
  const banner = document.getElementById('banner');

  // Store file references independently — input.files is read-only so
  // drag-and-drop cannot assign to it; use these variables for FormData instead.
  let bundleFile = null;
  let pdfFile = null;

  function syncState() {
    bundleName.textContent = bundleFile ? bundleFile.name : '';
    pdfName.textContent = pdfFile ? pdfFile.name : '';
    verifyBtn.disabled = !bundleFile;
  }

  bundleInput.addEventListener('change', () => {
    if (bundleInput.files[0]) { bundleFile = bundleInput.files[0]; syncState(); }
  });
  pdfInput.addEventListener('change', () => {
    if (pdfInput.files[0]) { pdfFile = pdfInput.files[0]; syncState(); }
  });

  function wireDrop(zoneId, onFile) {
    const zone = document.getElementById(zoneId);
    ['dragenter','dragover'].forEach(ev =>
      zone.addEventListener(ev, e => { e.preventDefault(); zone.classList.add('drag'); }));
    ['dragleave','drop'].forEach(ev =>
      zone.addEventListener(ev, e => { e.preventDefault(); zone.classList.remove('drag'); }));
    zone.addEventListener('drop', e => {
      const f = e.dataTransfer.files[0];
      if (f) { onFile(f); syncState(); }
    });
  }
  wireDrop('bundleZone', f => { bundleFile = f; });
  wireDrop('pdfZone', f => { pdfFile = f; });

  const demoBtn = document.getElementById('demoBtn');
  demoBtn.addEventListener('click', async () => {
    netError.style.display = 'none';
    demoBtn.disabled = true;
    try {
      const [bundleRes, pdfRes] = await Promise.all([
        fetch('/demo/bundle'),
        fetch('/demo/pdf'),
      ]);
      if (!bundleRes.ok || !pdfRes.ok) throw new Error('demo files unavailable');
      const [bundleBlob, pdfBlob] = await Promise.all([bundleRes.blob(), pdfRes.blob()]);
      bundleFile = new File([bundleBlob], 'sample-contract-bundle.json', { type: 'application/json' });
      pdfFile = new File([pdfBlob], 'sample-contract.pdf', { type: 'application/pdf' });
      syncState();
    } catch (err) {
      netError.textContent = 'Could not load demo documents: ' + err.message;
      netError.style.display = 'block';
    } finally {
      demoBtn.disabled = false;
    }
  });

  function esc(s) {
    return String(s).replace(/[&<>"']/g, c =>
      ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  }

  function explorerLink(detail) {
    // Step 4 detail looks like "<txId> (round N)"; link the txId.
    const m = detail.match(/^([A-Z0-9]{20,})\s*(.*)$/);
    if (!m) return esc(detail);
    const txId = m[1];
    return '<a href="https://explorer.perawallet.app/tx/' + esc(txId) +
      '" target="_blank" rel="noopener">' + esc(txId) + '</a> ' + esc(m[2]);
  }

  const STEP_SUBTITLES = {
    'ML-DSA-65 Signature': 'Receipt authenticity (quantum-safe signature)',
    'PDF Hash': 'Document fingerprint match',
    'Merkle Inclusion': 'Document is in the sealed batch',
    'Algorand Anchor': 'Public ledger record confirmed',
    'State Proof': 'Quantum-safe network attestation (~17 min after anchoring)',
  };

  function renderSteps(steps) {
    stepsEl.innerHTML = '';
    for (const s of steps) {
      const isInfo = s.name === 'State Proof';
      const row = document.createElement('div');
      let iconClass, iconChar, stateClass;
      if (isInfo) {
        iconClass = 'info'; iconChar = 'i'; stateClass = ' info';
      } else if (s.skipped) {
        iconClass = 'skip'; iconChar = '–'; stateClass = ' skip';
      } else if (s.error) {
        iconClass = 'error'; iconChar = '!'; stateClass = '';
      } else if (s.passed) {
        iconClass = 'pass'; iconChar = '✓'; stateClass = '';
      } else {
        iconClass = 'fail'; iconChar = '✗'; stateClass = '';
      }
      row.className = 'step' + stateClass;
      const tag = isInfo ? '<span class="tag">Informational</span>' : '';
      const subtitle = STEP_SUBTITLES[s.name]
        ? '<div class="subname">' + esc(STEP_SUBTITLES[s.name]) + '</div>' : '';
      const detailHtml = s.name === 'Algorand Anchor' && s.passed
        ? explorerLink(s.detail) : esc(s.detail);
      row.innerHTML =
        '<div class="icon ' + iconClass + '">' + iconChar + '</div>' +
        '<div class="body"><div class="name">' + esc(s.name) + tag + '</div>' +
        subtitle +
        '<div class="detail">' + detailHtml + '</div></div>';
      stepsEl.appendChild(row);
    }
  }

  function renderSigners(signers) {
    if (!signers || !signers.length) { signersWrap.style.display = 'none'; return; }
    signersWrap.style.display = 'block';
    signersEl.innerHTML = '';
    for (const s of signers) {
      const el = document.createElement('div');
      el.className = 'signer';
      el.innerHTML =
        '<div class="sname">' + esc(s.name) + '</div>' +
        '<div class="smeta">' + esc(s.email) + ' — signed ' + esc(s.signedAt) + '</div>';
      signersEl.appendChild(el);
    }
  }

  function renderBanner(valid, hasSkipped, operationalError) {
    if (valid) {
      banner.className = 'banner valid';
      const sub = hasSkipped
        ? 'Original document not verified — upload the PDF to complete verification'
        : 'On-chain record confirmed. DocuSign attestation verified offline.';
      banner.innerHTML = 'VALID ✓ — record confirmed<span class="sub">' + sub + '</span>';
      return;
    }
    if (operationalError) {
      banner.className = 'banner warn';
      banner.innerHTML = 'COULD NOT VERIFY<span class="sub">Network or configuration error — try again or check the server.</span>';
      return;
    }
    banner.className = 'banner invalid';
    banner.innerHTML = 'INVALID ✗<span class="sub">One or more verification checks failed.</span>';
  }

  verifyBtn.addEventListener('click', async () => {
    netError.style.display = 'none';
    results.style.display = 'none';
    verifyBtn.disabled = true;
    spinner.style.display = 'block';

    const fd = new FormData();
    fd.append('bundle', bundleFile);
    if (pdfFile) fd.append('pdf', pdfFile);

    try {
      const res = await fetch('/api/verify', { method: 'POST', body: fd });
      const data = await res.json();
      if (data.error && (!data.steps || !data.steps.length)) {
        netError.textContent = 'Verification error: ' + data.error;
        netError.style.display = 'block';
        return;
      }
      const steps = data.steps || [];
      const hasSkipped = steps.some(s => s.skipped);
      const failing = steps.filter(s => s.name !== 'State Proof' && !s.passed);
      const operationalError = failing.length > 0 && failing.every(s => s.error);
      renderSteps(steps);
      renderSigners(data.signers || []);
      renderBanner(!!data.valid, hasSkipped, operationalError);
      results.style.display = 'block';
    } catch (err) {
      netError.textContent = 'Network error: ' + err.message;
      netError.style.display = 'block';
    } finally {
      spinner.style.display = 'none';
      verifyBtn.disabled = !bundleFile;
    }
  });
</script>
</body>
</html>
